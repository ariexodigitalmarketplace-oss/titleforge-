<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TitleForge — AI YouTube Title Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --bg4: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #e8ff57;
    --accent2: #c8df30;
    --accent-dim: rgba(232,255,87,0.12);
    --accent-glow: rgba(232,255,87,0.06);
    --purple: #a78bfa;
    --blue: #60a5fa;
    --coral: #fb7185;
    --teal: #34d399;
    --orange: #fb923c;
    --pink: #f472b6;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 12px;
    --radius-lg: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: #0a0a0f; }
  .logo-text { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--text); letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: 14px; font-weight: 400; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }

  .nav-mobile-btn { display: none; background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; }

  .generator-section {
    position: relative; z-index: 1;
    padding: 120px 2rem 80px;
    max-width: 900px;
    margin: 0 auto;
  }

  .section-label { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .section-label span { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .section-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: -1px; margin-bottom: 0.75rem; line-height: 1.1; }
  .section-desc { color: var(--text2); font-size: 1.05rem; font-weight: 300; margin-bottom: 2.5rem; }

  .gen-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  .gen-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .gen-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .gen-label svg { width: 14px; height: 14px; fill: var(--text3); }

  textarea#video-desc {
    width: 100%; min-height: 140px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px; font-weight: 300;
    padding: 16px 18px;
    resize: vertical; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }
  textarea#video-desc::placeholder { color: var(--text3); }
  textarea#video-desc:focus { border-color: rgba(232,255,87,0.35); box-shadow: 0 0 0 3px rgba(232,255,87,0.06); }

  .gen-options { display: flex; gap: 12px; margin-top: 1.25rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .gen-options-label { font-size: 13px; color: var(--text3); flex-shrink: 0; }

  .cat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-chip {
    padding: 6px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border2);
    background: transparent; color: var(--text2);
    transition: all 0.2s; font-family: var(--font-body);
  }
  .cat-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .cat-chip.active { border-color: var(--accent); background: var(--accent); color: #0a0a0f; }

  .gen-footer { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .char-count { font-size: 13px; color: var(--text3); }

  .gen-btn {
    background: var(--accent); color: #0a0a0f;
    border: none; padding: 12px 28px; border-radius: 10px;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px; letter-spacing: 0.3px;
  }
  .gen-btn:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 8px 30px rgba(232,255,87,0.3); }
  .gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .gen-btn svg { width: 16px; height: 16px; fill: #0a0a0f; }

  .loading-state { display: none; padding: 3rem 0; text-align: center; }
  .loading-state.visible { display: block; }

  .loader-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5rem; }
  .loader-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: dotBounce 1.2s ease infinite; }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-14px); opacity: 1; }
  }

  .loading-text { color: var(--text2); font-size: 14px; animation: fadeInOut 2s ease infinite; }

  @keyframes fadeInOut {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .results-section { display: none; margin-top: 2.5rem; }
  .results-section.visible { display: block; }

  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .results-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; color: var(--text); }
  .results-meta { font-size: 13px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .results-meta::before { content: ''; width: 6px; height: 6px; background: var(--teal); border-radius: 50%; }

  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filter-tab {
    padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--text3);
    transition: all 0.2s; font-family: var(--font-body);
  }
  .filter-tab:hover, .filter-tab.active { border-color: var(--border2); color: var(--text); background: var(--bg3); }

  .title-cards { display: flex; flex-direction: column; gap: 10px; }

  .title-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    animation: fadeUp 0.4s ease both;
  }
  .title-card:hover { border-color: var(--border2); background: var(--bg4); transform: translateX(3px); }

  .title-num { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text3); min-width: 24px; text-align: right; }
  .title-content { flex: 1; min-width: 0; }
  .title-text { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.4; margin-bottom: 4px; }

  .title-cat-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 10px; border-radius: 100px; letter-spacing: 0.3px; }
  .badge-viral { background: rgba(251,113,133,0.15); color: var(--coral); }
  .badge-educational { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge-documentary { background: rgba(167,139,250,0.15); color: var(--purple); }
  .badge-storytelling { background: rgba(52,211,153,0.15); color: var(--teal); }
  .badge-business { background: rgba(251,146,60,0.15); color: var(--orange); }

  .title-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .copy-btn {
    background: var(--bg4); border: 1px solid var(--border2);
    color: var(--text2); padding: 7px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 5px;
    font-family: var(--font-body); white-space: nowrap;
  }
  .copy-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }
  .copy-btn:hover { background: var(--accent-dim); border-color: rgba(232,255,87,0.3); color: var(--accent); }
  .copy-btn.copied { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); color: var(--teal); }

  .copy-all-btn {
    width: 100%; margin-top: 1rem; padding: 12px;
    background: var(--bg3); border: 1px dashed var(--border2);
    border-radius: var(--radius); color: var(--text2);
    font-size: 14px; font-weight: 400; cursor: pointer;
    transition: all 0.2s; font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .copy-all-btn:hover { border-style: solid; border-color: var(--border2); color: var(--text); background: var(--bg4); }

  .error-msg { display: none; background: rgba(251,113,133,0.1); border: 1px solid rgba(251,113,133,0.2); border-radius: var(--radius); padding: 12px 16px; color: var(--coral); font-size: 14px; margin-top: 1rem; }
  .error-msg.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .nav-links { display: none; }
    .nav-mobile-btn { display: flex; }
    .gen-options { flex-direction: column; align-items: flex-start; }
    .title-card { flex-direction: column; align-items: flex-start; }
    .title-actions { width: 100%; justify-content: flex-end; }
  }
  @media (max-width: 480px) {
    nav { padding: 0 1rem; }
    .generator-section { padding: 100px 1rem 60px; }
    .gen-card { padding: 1.5rem 1.25rem; }
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; opacity: 0.12; }
  .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -200px; }
  .orb-2 { width: 500px; height: 500px; background: #7c3aed; bottom: 0; left: -200px; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <a href="#" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M9 3H3v6l2 2-2 2v6h6l2-2 2 2h6v-6l-2-2 2-2V3h-6l-2 2-2-2z"/></svg>
    </div>
    <span class="logo-text">Title<span>Forge</span></span>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="#generator">Generator</a></li>
  </ul>
  <button class="nav-mobile-btn" id="mobileMenu" aria-label="Toggle menu">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</nav>

<section class="generator-section" id="generator">
  <div class="section-label"><span>Generator</span></div>
  <h2 class="section-title">Describe your video</h2>
  <p class="section-desc">Tell us what your video is about and pick a style. We'll handle the rest.</p>

  <div class="gen-card">
    <div class="gen-label">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" width="14" height="14"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      What is your video about?
    </div>
    <textarea id="video-desc" placeholder="e.g. A tutorial showing how to make sourdough bread at home, covering starter creation, shaping, and baking. Aimed at complete beginners who've never baked bread before..."></textarea>

    <div class="gen-options">
      <span class="gen-options-label">Style:</span>
      <div class="cat-chips" id="catChips">
        <button class="cat-chip active" data-cat="Viral">🔥 Viral</button>
        <button class="cat-chip" data-cat="Educational">📚 Educational</button>
        <button class="cat-chip" data-cat="Documentary">🎬 Documentary</button>
        <button class="cat-chip" data-cat="Storytelling">✨ Storytelling</button>
        <button class="cat-chip" data-cat="Business">💼 Business</button>
      </div>
    </div>

    <div class="gen-footer">
      <span class="char-count" id="charCount">0 / 500</span>
      <button class="gen-btn" id="generateBtn">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Generate 10 Titles
      </button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading-state" id="loadingState">
    <div class="loader-dots">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <p class="loading-text" id="loadingText">Analyzing your video content…</p>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <div class="results-title">Generated Titles</div>
      <div class="results-meta" id="resultsMeta">10 titles generated</div>
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="Viral">Viral</button>
      <button class="filter-tab" data-filter="Educational">Educational</button>
      <button class="filter-tab" data-filter="Documentary">Documentary</button>
      <button class="filter-tab" data-filter="Storytelling">Storytelling</button>
      <button class="filter-tab" data-filter="Business">Business</button>
    </div>
    <div class="title-cards" id="titleCards"></div>
    <button class="copy-all-btn" id="copyAllBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy all titles
    </button>
  </div>
</section>

<script>
const textarea    = document.getElementById('video-desc');
const charCount   = document.getElementById('charCount');
const generateBtn = document.getElementById('generateBtn');
const loadingState= document.getElementById('loadingState');
const loadingText = document.getElementById('loadingText');
const resultsSection = document.getElementById('resultsSection');
const titleCards  = document.getElementById('titleCards');
const resultsMeta = document.getElementById('resultsMeta');
const errorMsg    = document.getElementById('errorMsg');
const copyAllBtn  = document.getElementById('copyAllBtn');

let selectedCat = 'Viral';
let allTitles   = [];
let activeFilter= 'all';

textarea.addEventListener('input', () => {
  const len = textarea.value.length;
  charCount.textContent = `${Math.min(len, 500)} / 500`;
  if (len > 500) textarea.value = textarea.value.slice(0, 500);
});

document.querySelectorAll('.cat-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedCat = chip.dataset.cat;
  });
});

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.filter;
    renderCards();
  });
});

const loadingMessages = [
  'Analyzing your video content…',
  'Researching high-performing patterns…',
  'Crafting click-worthy hooks…',
  'Optimizing for your audience…',
  'Finalizing 10 title ideas…',
];
let loadingInterval;
function startLoadingMessages() {
  let i = 0;
  loadingText.textContent = loadingMessages[0];
  loadingInterval = setInterval(() => {
    i = (i + 1) % loadingMessages.length;
    loadingText.textContent = loadingMessages[i];
  }, 1800);
}
function stopLoadingMessages() { clearInterval(loadingInterval); }

generateBtn.addEventListener('click', async () => {
  const desc = textarea.value.trim();
  if (!desc) { showError('Please describe your video before generating titles.'); return; }
  if (desc.length < 20) { showError('Please provide a bit more detail (at least 20 characters).'); return; }

  hideError();
  setLoading(true);
  resultsSection.classList.remove('visible');

  try {
    const titles = await generateTitles(desc, selectedCat);
    allTitles = titles;
    setLoading(false);
    renderResults();
  } catch (err) {
    setLoading(false);
    showError(err.message || 'Something went wrong. Please try again.');
    console.error(err);
  }
});

async function generateTitles(description, category) {
  const response = await fetch('/api/generate-titles', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: description,
      category: category,
    }),
  });

  if (!response.ok) {
    const errData = await response.json().catch(() => ({}));
    throw new Error(errData.error || `API error ${response.status}`);
  }

  const data = await response.json();
  if (!data.titles || !Array.isArray(data.titles)) {
    throw new Error('Invalid response format');
  }
  return data.titles;
}

function renderResults() {
  resultsSection.classList.add('visible');
  resultsMeta.textContent = `${allTitles.length} titles generated`;
  renderCards();
  resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderCards() {
  const filtered = activeFilter === 'all'
    ? allTitles
    : allTitles.filter(t => t.category === activeFilter);

  titleCards.innerHTML = '';

  if (!filtered.length) {
    titleCards.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text3);font-size:14px;">No titles in this category.</div>';
    return;
  }

  filtered.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'title-card';
    card.style.animationDelay = `${i * 0.06}s`;
    const catKey = (t.category || 'viral').toLowerCase();
    card.innerHTML = `
      <div class="title-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="title-content">
        <div class="title-text">${escapeHtml(t.title)}</div>
        <span class="title-cat-badge badge-${catKey}">${t.category || 'Viral'}</span>
      </div>
      <div class="title-actions">
        <button class="copy-btn" data-title="${escapeAttr(t.title)}">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
      </div>`;
    titleCards.appendChild(card);
  });

  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => copyTitle(btn, btn.dataset.title));
  });
}

function copyTitle(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;stroke:currentColor;fill:none;"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" style="width:13px;height:13px;stroke:currentColor;fill:none;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.classList.add('copied'); btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 2000);
  });
}

copyAllBtn.addEventListener('click', () => {
  const allText = allTitles.map((t, i) => `${i + 1}. ${t.title}`).join('\n');
  navigator.clipboard.writeText(allText).then(() => {
    copyAllBtn.textContent = '✓ All titles copied!';
    setTimeout(() => {
      copyAllBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy all titles`;
    }, 2000);
  });
});

function setLoading(on) {
  generateBtn.disabled = on;
  generateBtn.innerHTML = on
    ? `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#0a0a0f;animation:spin 1s linear infinite"><path d="M12 2a10 10 0 0110 10"/></svg> Generating…`
    : `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#0a0a0f;"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Generate 10 Titles`;
  if (on) { loadingState.classList.add('visible'); startLoadingMessages(); }
  else    { loadingState.classList.remove('visible'); stopLoadingMessages(); }
}

function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('visible'); }
function hideError()    { errorMsg.classList.remove('visible'); }
function escapeHtml(s)  { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s)  { return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
